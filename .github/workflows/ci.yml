name: CI — Type Check & Pre-Flight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: TypeScript type check (blocks deployment) ────────────────────────
  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ── Job 2: Post-deploy preflight (main branch only) ─────────────────────────
  preflight:
    name: Live Pre-Flight
    runs-on: ubuntu-latest
    needs: type-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Poll until the new deployment is live (up to 6 minutes)
      - name: Wait for Vercel deployment
        run: |
          echo "Waiting for deployment to go live..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "$APP_URL/api/news" --max-time 10 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Deployment live after attempt $i"
              break
            fi
            echo "  Attempt $i/24: HTTP $STATUS — waiting 15s..."
            sleep 15
          done
        env:
          APP_URL: ${{ secrets.APP_URL }}

      - name: Run pre-flight verification
        run: npx tsx scripts/preflight.ts
        env:
          APP_URL:                      ${{ secrets.APP_URL }}
          TELEGRAM_BOT_TOKEN:           ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CRON_SECRET:                   ${{ secrets.CRON_SECRET }}
          TELEGRAM_WEBHOOK_SECRET:      ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          UPSTASH_REDIS_REST_URL:       ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN:     ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ secrets.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME }}
