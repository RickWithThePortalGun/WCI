name: Telegram Cron — Alerts & Briefings

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:          # allow manual trigger from Actions tab

jobs:
  ping:
    name: Ping cron endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/telegram/cron
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/telegram/cron" \
            --max-time 30)
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Cron endpoint returned HTTP $STATUS"
          fi
