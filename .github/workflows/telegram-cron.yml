name: Telegram Bot Cron

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger alert check & scheduled briefings
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/telegram/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 30
